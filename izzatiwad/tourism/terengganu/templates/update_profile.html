{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Update Profile - Terengganu Tourism</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700&display=swap" rel="stylesheet">
    <style>
        /* General styles */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background-color: aliceblue;
            color: #333;
            line-height: 1.6;
        }

        h2 {
            font-weight: bold;
            text-align: center;
            margin-bottom: 20px;
        }

        /* Navbar styles */
        nav {
            background-color: #1b1c27;
            padding: 15px 20px;
            box-shadow: 0px 4px 8px rgba(0, 0, 0, 0.1);
            display: flex;
            justify-content: space-between;
            align-items: center; 
        }

        nav ul {
            list-style: none;
            display: flex;
            justify-content: right;
        }

        nav ul li {
            margin: 0 20px;
        }

        nav ul li a {
            font-size: 18px;
            text-transform: uppercase;
            padding: 8px 12px;
            color: white;
            transition: background-color 0.3s ease;
            text-decoration: none;
        }
        .logo-container {
            display: flex;
            align-items: center;
        }

        .logo-container img {
            width: 80px; /* Adjust the size as needed */
            height: auto;
            object-fit: contain;
        }

        .logo-container span {
            font-size: 24px;
            font-weight: bold;
            color: white;
            margin-left: 10px;
        }

        nav ul li a:hover {
            background-color: #9ec1d7;
            border-radius: 4px;
        }

        /* User Profile Section */
        .user-profile {
            margin-top: 100px; /* Ensure it's below the fixed navbar */
            padding: 40px;
            max-width: 800px;
            background-color: #fff;
            box-shadow: 0px 8px 16px rgba(0, 0, 0, 0.1);
            border-radius: 8px;
            margin: 100px auto;
        }

        .form-group {
            margin: 15px 0;
        }

        .form-group label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }

        .form-group input[type="text"],
        .form-group input[type="email"] {
            width: 80%;
            padding: 10px;
            border-radius: 4px;
            border: 1px solid #ccc;
            font-size: 16px;
            margin-top: 5px;
        }

        button {
            background-color: #18465a;
            color: white;
            border: none;
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
            border-radius: 4px;
            transition: background-color 0.3s ease;
            margin-top: 15px;
        }

        button:hover {
            background-color: #65403a;
        }

        /* Footer Styles */
        footer {
            background-color: #1b1c27;
            color: white;
            text-align: center;
            padding: 20px;
            position: fixed;
            bottom: 0;
            width: 100%;
        }

        footer p {
            margin: 0;
        }
    </style>
</head>
<body>

    <!-- Navbar -->
    <nav>
        <div class="logo-container">
            <img src="{% static 'media/Terengganu.png' %}" alt="">
            <span>Ganu Vibes</span>
        </div>
        <ul>
            <li><a href="{% url 'homepage2' %}">Home</a></li>
            <li><a href="{% url 'packages2' %}">Packages</a></li>
            <li><a href="{% url 'search' %}">Search</a></li>
            <li><a href="{% url 'review'  %}">Review</a></li>
            <li><a href="{% url 'profile' %}">Profile</a></li>
        </ul>
    </nav>

    <section class="user-profile">
        <h2>Update Profile</h2>
        <form action="{% url 'save_profile' data.custname %}" method="post">
            {% csrf_token %}
            <div class="form-group">
                <label for="custname">Customer Name:</label>
                <input type="text" id="custname" name="custname" value="{{ data.custname }}" required>
            </div>
            <div class="form-group">
                <label for="custmail">Email:</label>
                <input type="email" id="custmail" name="custmail" value="{{ data.custmail }}" required>
            </div>
            <button type="submit">Save Changes</button>
        </form>
    </section>

    <!-- Footer -->
    <footer>
        <p>&copy; 2024 Terengganu Tourism. All Rights Reserved.</p>
    </footer>
</body>
</html>
