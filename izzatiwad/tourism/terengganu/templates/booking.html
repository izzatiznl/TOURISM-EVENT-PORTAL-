{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Booking</title>
    <style>
        /* General styles */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Poppins', sans-serif;
            background-color: #f4f4f4;
            color: #333;
            line-height: 1.6;
            background-color: aliceblue;
        }

        a {
            text-decoration: none;
            color: #fff;
        }
        
        /* Navbar styles */
        nav {
        background-color: #1b1c27;
        padding: 15px 20px;
        box-shadow: 0px 4px 8px rgba(0, 0, 0, 0.1);
        position:relative;
        width: 100%;
        top: 0;
        z-index: 1000;
        display: flex;
        justify-content: space-between;
        align-items: center;
  
        }

        .logo-container {
            display: flex;
            align-items: center;
        }

        .logo-container img {
            width: 80px; /* Adjust the size as needed */
            height: auto;
            object-fit: contain;
        }

        .logo-container span {
            font-size: 24px;
            font-weight: bold;
            color: white;
            margin-left: 10px;
        }

        nav ul {
            list-style: none;
            display: flex;
            justify-content: flex-end;
            margin-right: 50px;
        }

        nav ul li {
            margin: 0 20px;
        }

        nav ul li a {
            font-size: 18px;
            color: white;
            text-transform: uppercase;
            padding: 8px 12px;
            transition: background-color 0.3s ease;
        }

        nav ul li a:hover {
            background-color: #9ec1d7;
            border-radius: 4px;
        }
        
        /* Booking form styles */
        form {
            background-color: #fff;
            padding: 30px;
            max-width: 600px;
            margin: 50px auto;
            box-shadow: 0px 8px 16px rgba(0, 0, 0, 0.1);
            border-radius: 8px;
        }

        form h2 {
            text-align: center;
            font-size: 28px;
            margin-bottom: 30px;
            color: #1b1c27;
        }

        form label {
            font-size: 16px;
            font-weight: bold;
            color: #1b1c27;
        }

        form input, select {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 16px;
        }

        form input[type="submit"] {
            background-color:  #18465a;
            color: white;
            border: none;
            padding: 10px;
            font-size: 18px;
            cursor: pointer;
            transition: background-color 0.3s ease;
        }

        form input[type="submit"]:hover {
            background-color:  #65403a;
        }

        /* Style for the message */
        p {
            text-align: center;
            font-size: 18px;
            color: #ff6b6b;
            padding-bottom: 50px;
        }

            /* Footer Styles */
            footer {
            background-color: #1b1c27;
            color: white;
            text-align: center;
            padding: 20px;
            bottom: 0;
            width: 100%;
            z-index: 1000; 

           
        }

        footer p {
            margin: 0;
        }
    </style>
</head>
<body>
    <!-- Navbar -->
    <nav>
        <div class="logo-container">
            <img src="{% static 'media/Terengganu.png' %}" alt="">
            <span>Ganu Vibes</span>
        </div>
        <ul>
            <li><a href="{% url 'homepage2' %}">Home</a></li>
            <li><a href="{% url 'packages2' %}">Packages</a></li>
            <li><a href="{% url 'search' %}">Search</a></li>
            <li><a href="{% url 'review' %}">Review</a></li>

        </ul>
    </nav>
    <br><br>
    <center><h1>Booking</h1></center>

    <form action="{% url 'booking' %}" method="post">
        {% csrf_token %}
        <label for="package">Package:</label>
        <select name="packagename" required>
            <option value="">Choose Package:</option>
            {% for package in package %}
                <option value="{{ package.packageid }}">{{ package.packagename }}</option>
            {% endfor %}
        </select>
        <br><br>
        <label for="bookingdate">Date:</label>
        <input type="date" name="bookingdate" required>
        <br><br>
        <label for="bookingticket">Booking ticket:</label>
        <input type="number" name="bookingticket" min="1" required>
        <br><br>
        <input type="submit" value="Book Now">
    </form>

    {% if message %}
        <p>{{ message }}</p>
    {% endif %}

    <footer>
        <p style="color: white;">&copy; 2024 Terengganu Tourism. All Rights Reserved.</p>
    </footer>

</body>
</html>
