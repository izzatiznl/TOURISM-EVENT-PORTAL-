{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <style>
        /* General styles */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
        font-family: 'Poppins', sans-serif;
        background-image: url("{% static 'media/wallpaperflare.com_wallpaper (1).jpg' %}"); /* Add your image path */
        background-color: #eff1ee; /* Fallback color */
        background-size: cover; /* Scale the image to cover the entire body */
        background-position: center; /* Center the image */
        background-repeat: no-repeat; /* Prevent the image from repeating */
        color: #333;
        display: flex;
        flex-direction: column;
        min-height: 100vh;
        }

        a {
            text-decoration: none;
            color: #fff;
        }

        h2 {
            text-align: center;
            color: #18465a;
        }

        /* Navbar styles */
        nav {
            background-color: #1b1c27;
            padding: 15px 20px;
            box-shadow: 0px 4px 8px rgba(0, 0, 0, 0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo-container {
            display: flex;
            align-items: center;
        }

        .logo-container img {
            width: 80px; /* Adjust the size as needed */
            height: auto;
            object-fit: contain;
        }

        .logo-container span {
            font-size: 24px;
            font-weight: bold;
            color: white;
            margin-left: 10px;
        }

        nav ul {
            list-style: none;
            display: flex;
            justify-content: right;
        }

        nav ul li {
            margin: 0 20px;
        }

        nav ul li a {
            font-size: 18px;
            color: white;
            text-transform: uppercase;
            padding: 8px 12px;
            transition: background-color 0.3s ease;
        }

        nav ul li a:hover {
            background-color: #9ec1d7;
            border-radius: 4px;
        }

        /* Login form styles */
        form {
            background-color: white;
            padding: 40px;
            border-radius: 8px; /* Adjusted for consistency */
            box-shadow: 0px 4px 12px rgba(0, 0, 0, 0.1);
            max-width: 400px;
            width: 100%;
            margin: 50px auto;
        }

        form h2 {
            margin-bottom: 20px;
            font-weight: 600;
        }

        label {
            font-size: 16px;
            color: #333;
        }

        input[type="text"], input[type="password"] {
            width: 100%;
            padding: 10px;
            margin: 10px 0 20px;
            border: 1px solid #ccc;
            border-radius: 5px;
            font-size: 16px;
        }

        input[type="submit"] {
            display: block; /* Center align the button */
            background-color: #18465a; /* Change to match packages button color */
            color: white;
            border: none;
            padding: 12px; /* Adjusted for consistency */
            text-align: center;
            width: 100%; /* Full width */
            margin-top: 20px; /* Space above the button */
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
            transition: background-color 0.3s ease;
        }

        input[type="submit"]:hover {
            background-color: #ff4a4a; /* Hover effect */
        }

        .message {
            text-align: center;
            color: red;
            margin-top: 10px;
        }

        /* Footer styles */
        footer {
            background-color: #1b1c27;
            color: white;
            text-align: center;
            padding: 20px;
            margin-top: auto;
            width: 100%;
        }

        footer p {
            margin: 0;
        }
    </style>
</head>
<body>

    <!-- Navbar -->
    <nav>
        <div class="logo-container">
            <img src="{% static 'media/Terengganu.png' %}" alt="Logo">
            <span>Ganu Vibes</span>
        </div>
        <ul>
            <li><a href="{% url 'homepage' %}">Home</a></li>
            <li><a href="{% url 'packages' %}">Packages</a></li>
            <li><a href="{% url 'login' %}">Login</a></li>
            <li><a href="{% url 'register' %}">Register</a></li>
        </ul>
    </nav>





    <!-- Login Form -->
    <form action="" method="post">
        {% csrf_token %}
        <h2>Login to Your Account</h2>
        <label for="username">Username</label>
        <input type="text" name="username" placeholder="Enter your username" required>
        
        <label for="password">Password</label>
        <input type="password" name="password" placeholder="Enter your password" required>
        
        <input type="submit" value="Login">
        
        <div class="message">{{message}}</div>
    </form>

    <!-- Footer -->
    <footer>
        <p>&copy; 2024 Terengganu Tourism. All Rights Reserved.</p>
    </footer>

</body>
</html>
