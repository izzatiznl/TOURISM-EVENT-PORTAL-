{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Review Page</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700&display=swap" rel="stylesheet">
    <style>
        /* General styles */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background-color: aliceblue;
            color: #333;
            line-height: 1.6;
        }

        a {
            text-decoration: none;
            color: white;
        }

        h1, h2, h3 {
            font-weight: bold;
        }

        /* Navbar styles */
        nav {
        background-color: #1b1c27;
        padding: 15px 20px;
        box-shadow: 0px 4px 8px rgba(0, 0, 0, 0.1);
        position:relative;
        width: 100%;
        top: 0;
        z-index: 1000;
        display: flex;
        justify-content: space-between;
        align-items: center;
        }

        .logo-container {
            display: flex;
            align-items: center;
        }

        .logo-container img {
            width: 80px; /* Adjust the size as needed */
            height: auto;
            object-fit: contain;
        }

        .logo-container span {
            font-size: 24px;
            font-weight: bold;
            color: white;
            margin-left: 10px;
        }

        nav ul {
            list-style: none;
            display: flex;
            justify-content: right;
        }

        nav ul li {
            margin: 0 20px;
        }

        nav ul li a {
            font-size: 18px;
            text-transform: uppercase;
            padding: 8px 12px;
            transition: background-color 0.3s ease;
        }

        nav ul li a:hover {
            background-color: #9ec1d7;
            border-radius: 4px;
        }

        /* Review Section */
        .review-container {
            margin-top: 100px;
            padding: 40px;
            max-width: 800px;
            background-color: #fff;
            box-shadow: 0px 8px 16px rgba(0, 0, 0, 0.1);
            border-radius: 8px;
            margin: 100px auto;
        }

        .review-container h2 {
            text-align: center;
            font-size: 36px;
            margin-bottom: 20px;
        }

        .review-container form {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .review-container input[type="text"] {
            width: 80%;
            padding: 10px;
            margin: 10px 0;
            border-radius: 4px;
            border: 1px solid #ccc;
            font-size: 16px;
        }

        .review-container input[type="submit"] {
            background-color: #18465a;
            color: white;
            border: none;
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
            border-radius: 4px;
            transition: background-color 0.3s ease;
        }

        .review-container input[type="submit"]:hover {
            background-color: #65403a;
        }

        .review-item {
            background-color: #f9f9f9;
            padding: 20px;
            margin-top: 20px;
            box-shadow: 0px 4px 8px rgba(0, 0, 0, 0.1);
            border-radius: 8px;
        }

        .review-item p {
            font-size: 16px;
        }

        /* Footer Styles */
        footer {
            background-color: #1b1c27;
            color: white;
            text-align: center;
            padding: 20px;
            bottom: 0;
            width: 100%;
            z-index: 1000; 

           
        }

        footer p {
            margin: 0;
        }
    </style>
</head>
<body>

    <!-- Navbar -->
    <nav>
        <div class="logo-container">
            <img src="{% static 'media/Terengganu.png' %}" alt="">
            <span>Ganu Vibes</span>
        </div>
        <ul>
            <li><a href="{% url 'homepage2' %}">Home</a></li>
            <li><a href="{% url 'packages2' %}">Packages</a></li>
            <li><a href="{% url 'review'  %}">Review</a></li>
        </ul>
    </nav>

    <!-- Review Section -->
    <div class="review-container">
        <h2>Write Your Review:</h2>
        <form action="{% url 'review' %}" method="POST">
            {% csrf_token %}
            Review: <br>
            <input type="text" name="reviewcomment" required>
            <br>
            <input type="submit" value="SUBMIT">
        </form>

        <br><br>

        {% for value in review_user %}
        <div class="review-item">
            <p>Customer ID: {{ value.custid.custid }} <br>
            Review: {{ value.reviewcomment }}</p>
        </div>
        {% endfor %}
    </div>

    <!-- Footer -->
    <footer>
        <p>&copy; 2024 Terengganu Tourism. All Rights Reserved.</p>
    </footer>
</body>
</html>
